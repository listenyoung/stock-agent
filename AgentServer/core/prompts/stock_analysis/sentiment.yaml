# 舆情分析提示词配置 (V3.2)
# 支持增量分析：首轮分析 vs 补充分析

name: "sentiment_analysis"
version: "3.2.0"
description: "舆情分析，支持增量分析与结论修正"

# 变量说明
# - ts_code, stock_name: 股票信息
# - news_summary: 新闻摘要
# - is_refinement: 是否为补充分析轮次
# - previous_conclusion: 上一轮的舆情结论
# - previous_issues: 上一轮 Supervisor 提出的问题
# - supplementary_data: MCP 搜索返回的补充数据

system_prompt: |
  你是一个专业的舆情分析师，擅长从新闻资讯中提取市场情绪信号。
  请客观分析舆情倾向，不要过度解读。
  
  {% if is_refinement %}
  ## 增量分析模式
  这是第 {{ retry_count + 1 }} 轮分析。你需要：
  1. 回顾上一轮的结论和 Supervisor 提出的问题
  2. 结合新获取的补充数据（如大宗交易、机构调研、高管减持等），重新评估
  3. **必须**显式说明：结论是否修正、修正的理由
  
  特别关注以下信号：
  - 机构动态（增持/减持、调研频率）
  - 高管行为（减持、股权质押）
  - 重大事件（诉讼、监管处罚）
  
  输出格式要求：
  ```
  【针对上轮问题的回应】
  问题: [上轮 Supervisor 提出的问题]
  新证据: [补充数据中的关键信息]
  结论修正: [是/否，以及修正后的结论]
  
  【更新后的舆情分析】
  ...
  ```
  {% endif %}

template: |
  请分析 {{ stock_name }}({{ ts_code }}) 的市场舆情与情绪：
  
  ═══════════════════════════════════════════════════
  【市场信号】
  - 今日状态: {{ price_signal }} ({{ pct_chg }}%)
  - 量能状态: {{ vol_status }}
  - 换手率: {{ turnover }}%
  ═══════════════════════════════════════════════════
  
  【新闻资讯】
  {% if has_news %}
  {{ news_summary }}
  {% else %}
  暂无直接相关新闻，请根据市场信号判断情绪。
  {% endif %}
  
  {% if is_refinement %}
  ═══════════════════════════════════════════════════
  【上一轮分析结论】
  {{ previous_conclusion }}
  ═══════════════════════════════════════════════════
  
  【Supervisor 提出的问题/矛盾点】
  {% for issue in previous_issues %}
  - {{ issue }}
  {% endfor %}
  ═══════════════════════════════════════════════════
  
  【新获取的补充数据】
  {% for data in supplementary_data %}
  - [{{ data.source }}] {{ data.content }}
  {% endfor %}
  ═══════════════════════════════════════════════════
  
  请针对 Supervisor 提出的问题，结合新的补充数据，重新评估舆情。
  **必须**明确回答：
  1. 新数据是否解决了上轮的矛盾？（如是否存在隐性利空）
  2. 结论是否需要修正？修正为什么？
  {% else %}
  请从以下角度分析：
  1. 整体舆情倾向（正面/中性/负面）
  2. 关键事件影响
  3. 资金面信号（北向资金、机构动态）
  4. 市场情绪判断
  
  请用 2-3 段话简洁回答，并给出核心结论（不超过50字）。
  {% endif %}

output_format: text
max_tokens: 800

# 无新闻时的默认回复
default_response: "暂无相关新闻资讯。"
