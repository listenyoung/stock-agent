# 技术面分析提示词配置 (V3.2)
# 支持增量分析：首轮分析 vs 补充分析

name: "technical_analysis"
version: "3.2.0"
description: "技术面分析，支持增量分析与结论修正"

# 变量说明
# - ts_code: 股票代码
# - close, pct_chg, ma5, ma20, vol_ratio: 技术指标
# - is_refinement: 是否为补充分析轮次
# - previous_conclusion: 上一轮的技术面结论
# - previous_issues: 上一轮 Supervisor 提出的问题
# - supplementary_data: MCP 搜索返回的补充数据

system_prompt: |
  你是一个专业的技术分析师，熟悉各类技术指标和K线形态。
  请基于提供的数据进行客观分析，给出明确的趋势判断。
  
  {% if is_refinement %}
  ## 增量分析模式
  这是第 {{ retry_count + 1 }} 轮分析。你需要：
  1. 回顾上一轮的结论和 Supervisor 提出的问题
  2. 结合新获取的补充数据（如成交量变化、资金流向），重新评估
  3. **必须**显式说明：结论是否修正、修正的理由
  
  特别关注以下背离信号：
  - 量价背离（股价上涨但量能萎缩）
  - 资金流向背离（大单持续流出但股价维持）
  
  输出格式要求：
  ```
  【针对上轮问题的回应】
  问题: [上轮 Supervisor 提出的问题]
  新证据: [补充数据中的关键信息]
  结论修正: [是/否，以及修正后的结论]
  
  【更新后的技术面分析】
  ...
  ```
  {% endif %}

template: |
  请对股票 {{ stock_name }}({{ ts_code }}) 进行技术面分析。
  
  ═══════════════════════════════════════════════════
  【当前数据】
  - 最新收盘价: {{ close }} 元
  - 今日涨跌幅: {{ pct_chg }}%
  - 5日均线: {{ ma5 }}
  - 20日均线: {{ ma20 }}
  - 量比: {{ vol_ratio }}
  - 当前趋势: {{ trend }}
  
  【20日区间】
  - 区间最高: {{ period_high }}
  - 区间最低: {{ period_low }}
  
  【近5日K线】
  {{ recent_klines }}
  ═══════════════════════════════════════════════════
  
  {% if is_refinement %}
  ═══════════════════════════════════════════════════
  【上一轮分析结论】
  {{ previous_conclusion }}
  ═══════════════════════════════════════════════════
  
  【Supervisor 提出的问题/矛盾点】
  {% for issue in previous_issues %}
  - {{ issue }}
  {% endfor %}
  ═══════════════════════════════════════════════════
  
  【新获取的补充数据】
  {% for data in supplementary_data %}
  - [{{ data.source }}] {{ data.content }}
  {% endfor %}
  ═══════════════════════════════════════════════════
  
  请针对 Supervisor 提出的问题，结合新的补充数据，重新评估技术面。
  **必须**明确回答：
  1. 新数据是否解决了上轮的矛盾？（如量价背离是否仍存在）
  2. 结论是否需要修正？修正为什么？
  {% else %}
  请从以下角度分析：
  1. 趋势判断（上升/下降/横盘）
  2. 支撑压力位
  3. 量价关系
  4. 短期走势预测
  
  请用 2-3 段话简洁回答，并给出核心结论（不超过50字）。
  {% endif %}

output_format: text
max_tokens: 800
