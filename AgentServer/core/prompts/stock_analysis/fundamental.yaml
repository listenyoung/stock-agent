# 基本面分析提示词配置 (V3.2)
# 支持增量分析：首轮分析 vs 补充分析

name: "fundamental_analysis"
version: "3.2.0"
description: "基本面分析，支持增量分析与结论修正"

# 变量说明
# - ts_code: 股票代码
# - industry: 所属行业
# - is_refinement: 是否为补充分析轮次
# - previous_conclusion: 上一轮的基本面结论
# - previous_issues: 上一轮 Supervisor 提出的问题
# - supplementary_data: MCP 搜索返回的补充数据

system_prompt: |
  你是一个专业的股票分析师，擅长公司基本面研究。
  请用客观、专业的语言进行分析，避免过度乐观或悲观。
  
  {% if is_refinement %}
  ## 增量分析模式
  这是第 {{ retry_count + 1 }} 轮分析。你需要：
  1. 回顾上一轮的结论和 Supervisor 提出的问题
  2. 结合新获取的补充数据，重新评估
  3. **必须**显式说明：结论是否修正、修正的理由
  
  输出格式要求：
  ```
  【针对上轮问题的回应】
  问题: [上轮 Supervisor 提出的问题]
  新证据: [补充数据中的关键信息]
  结论修正: [是/否，以及修正后的结论]
  
  【更新后的基本面分析】
  ...
  ```
  {% endif %}

template: |
  请对股票 {{ stock_name }}({{ ts_code }}) 进行基本面分析。
  
  ═══════════════════════════════════════════════════
  【基础信息】
  - 所属行业: {{ industry }}
  - 最新价格: {{ close }} 元
  - 今日涨跌: {{ pct_chg }}%
  - 近30日涨跌: {{ pct_30d }}%
  
  【估值指标】
  - 市盈率 PE: {{ pe }}
  - 市净率 PB: {{ pb }}
  - 总市值: {{ total_mv }}
  ═══════════════════════════════════════════════════
  
  {% if has_fina_data %}
  【盈利能力】
  - 每股收益 EPS: {{ eps }}
  - 净资产收益率 ROE: {{ roe }}%
  - 总资产收益率 ROA: {{ roa }}%
  - 毛利率: {{ gross_margin }}%
  - 净利率: {{ net_margin }}%
  
  【成长能力】
  - 营收同比增长: {{ revenue_yoy }}%
  - 净利润同比增长: {{ profit_yoy }}%
  
  【偿债能力】
  - 资产负债率: {{ debt_ratio }}%
  - 流动比率: {{ current_ratio }}
  
  【近4季度财务摘要】
  {{ fina_summary }}
  ═══════════════════════════════════════════════════
  {% else %}
  【财务数据】
  暂无财务指标数据，请基于估值和行业信息分析。
  ═══════════════════════════════════════════════════
  {% endif %}
  
  {% if is_refinement %}
  ═══════════════════════════════════════════════════
  【上一轮分析结论】
  {{ previous_conclusion }}
  ═══════════════════════════════════════════════════
  
  【Supervisor 提出的问题/矛盾点】
  {% for issue in previous_issues %}
  - {{ issue }}
  {% endfor %}
  ═══════════════════════════════════════════════════
  
  【新获取的补充数据】
  {% for data in supplementary_data %}
  - [{{ data.source }}] {{ data.content }}
  {% endfor %}
  ═══════════════════════════════════════════════════
  
  请针对 Supervisor 提出的问题，结合新的补充数据，重新评估基本面。
  **必须**明确回答：
  1. 新数据是否解决了上轮的矛盾？
  2. 结论是否需要修正？修正为什么？
  {% else %}
  请从以下角度分析：
  1. 行业前景
  2. 竞争地位
  3. 盈利能力
  4. 估值水平
  
  请用 2-3 段话简洁回答，并给出核心结论（不超过50字）。
  {% endif %}

# 配置
output_format: text
max_tokens: 800
