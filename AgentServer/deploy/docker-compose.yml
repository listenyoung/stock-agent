  #   networks:
  #     - stock-agent-network

  # loki:
  #   image: grafana/loki:2.9.0
  #   container_name: stock-agent-loki
  #   ports:
  #     - "3100:3100"
  #   networks:
  #     - stock-agent-network

volumes:
  mongo_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
  # grafana_data:

networks:
  stock-agent-network:
    driver: bridge
