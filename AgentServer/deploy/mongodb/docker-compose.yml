# MongoDB 独立部署配置
#
# 启动命令:
#   cd AgentServer/deploy/mongodb
#   docker-compose up -d
#
# 停止命令:
#   docker-compose down
#
# 查看日志:
#   docker-compose logs -f mongodb

version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: stock-agent-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: stock_agent
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
    name: stock-agent-mongo-data
