# Redis 独立部署配置
#
# 启动命令:
#   cd AgentServer/deploy/redis
#   docker-compose up -d
#
# 停止命令:
#   docker-compose down
#
# 查看日志:
#   docker-compose logs -f redis
#
# 连接测试:
#   docker exec -it stock-agent-redis redis-cli ping

version: "3.9"

services:
  redis:
    image: redis:7.2-alpine
    container_name: stock-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
    name: stock-agent-redis-data
