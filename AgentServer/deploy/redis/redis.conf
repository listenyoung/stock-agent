# Redis 配置文件
# 参考: https://redis.io/docs/management/config/

# 网络
bind 0.0.0.0
port 6379

# 密码 (如需设置密码，取消下行注释并修改)
# requirepass your_password_here

# 持久化
appendonly yes
appendfsync everysec

# 内存管理
maxmemory 512mb
maxmemory-policy allkeys-lru

# 日志
loglevel notice

# 连接
timeout 0
tcp-keepalive 300

# 安全
protected-mode no
