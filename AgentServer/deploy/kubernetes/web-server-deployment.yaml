apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-agent-web-server
  labels:
    app: stock-agent
    component: web-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stock-agent
      component: web-server
  template:
    metadata:
      labels:
        app: stock-agent
        component: web-server
    spec:
      containers:
      - name: web-server
        image: stock-agent/web-server:latest
        ports:
        - containerPort: 8000
        env:
        - name: APP_ENV
          value: "production"
        - name: MONGODB_URL
          valueFrom:
            secretKeyRef:
              name: stock-agent-secrets
              key: mongodb-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: stock-agent-secrets
              key: redis-url
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: stock-agent-secrets
              key: jwt-secret
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: stock-agent-web-server
spec:
  selector:
    app: stock-agent
    component: web-server
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stock-agent-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/websocket-services: "stock-agent-web-server"
spec:
  rules:
  - host: api.stockagent.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: stock-agent-web-server
            port:
              number: 80
